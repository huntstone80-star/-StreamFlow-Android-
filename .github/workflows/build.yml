name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Debug SDK environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/cmdline-tools/latest/bin/ 2>/dev/null || echo "no cmdline-tools"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms dir"
      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
      - name: Install Android SDK platform 35
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" || \
          $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-35" || true
      - name: Generate keystore if missing
        run: |
          if [ ! -f app/novafame.keystore ]; then
            keytool -genkey -v -keystore app/novafame.keystore \
              -alias novafame -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass novafame123 -keypass novafame123 \
              -dname "CN=NovaFame, OU=App, O=NovaFame, L=Unknown, ST=Unknown, C=US"
          fi
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      - name: Show build output
        if: failure()
        run: find app/build -name "*.txt" -o -name "*.log" 2>/dev/null | head -20
      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/NovaFame-Android.apk
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaFame-APK
          path: app/build/outputs/apk/release/NovaFame-Android.apk
          retention-days: 30
      - name: Upload APK to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: app/build/outputs/apk/release/NovaFame-Android.apk
          tag: novafame-latest
          name: "NovaFame APK"
          body: "Latest NovaFame Android TV APK build"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
