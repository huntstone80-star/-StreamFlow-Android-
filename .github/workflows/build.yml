name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34'
      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
      - name: Generate keystore if missing
        run: |
          if [ ! -f app/novafame.keystore ]; then
            keytool -genkey -v -keystore app/novafame.keystore \
              -alias novafame -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass novafame123 -keypass novafame123 \
              -dname "CN=NovaFame, OU=App, O=NovaFame, L=Unknown, ST=Unknown, C=US"
          fi
      - name: Make gradlew executable
        run: |
          chmod +x gradlew
          sed -i 's/\x0D$//' gradlew  # Fix CRLF line endings for Linux runner
      - name: Setup SDK and project
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle.log
          exit ${PIPESTATUS[0]}
      - name: Surface Gradle error
        if: failure()
        run: |
          echo "### Gradle build failed — last 50 lines of log:" >> $GITHUB_STEP_SUMMARY
          tail -50 gradle.log >> $GITHUB_STEP_SUMMARY
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: gradle.log
          retention-days: 7
      - name: Rename APK
        run: |
          APK=$(find app/build/outputs -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            DIR=$(dirname "$APK")
            cp "$APK" "$DIR/NovaFame-Android.apk"
            echo "APK: $APK -> $DIR/NovaFame-Android.apk"
          else
            echo "No APK found!"
            exit 1
          fi
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaFame-APK
          path: app/build/outputs/apk/*/NovaFame-Android.apk
          retention-days: 30
      - name: Upload APK to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: app/build/outputs/apk/*/NovaFame-Android.apk
          tag: novafame-latest
          name: "NovaFame APK"
          body: "Latest NovaFame Android TV APK build"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
