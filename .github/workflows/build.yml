name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
      - name: Install Android SDK platform 34
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" || \
          yes | $ANDROID_HOME/tools/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" || true
          echo "=== Installed SDK platforms ==="
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
      - name: Generate keystore if missing
        run: |
          if [ ! -f app/novafame.keystore ]; then
            keytool -genkey -v -keystore app/novafame.keystore \
              -alias novafame -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass novafame123 -keypass novafame123 \
              -dname "CN=NovaFame, OU=App, O=NovaFame, L=Unknown, ST=Unknown, C=US"
          fi
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Debug environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties
      - name: Build APK
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace --info 2>&1 | tee gradle.log
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: gradle.log
          retention-days: 7
      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/NovaFame-Android.apk
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaFame-APK
          path: app/build/outputs/apk/release/NovaFame-Android.apk
          retention-days: 30
      - name: Upload APK to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: app/build/outputs/apk/release/NovaFame-Android.apk
          tag: novafame-latest
          name: "NovaFame APK"
          body: "Latest NovaFame Android TV APK build"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
